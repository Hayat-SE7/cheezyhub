<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CheezyHub POS — Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #07070a;
      color: #f2f2f5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      text-align: center;
      padding: 24px;
    }
    .icon { font-size: 56px; margin-bottom: 8px; }
    h1 { font-size: 24px; font-weight: 700; color: #f2f2f5; }
    p  { font-size: 14px; color: #4a4a58; max-width: 340px; line-height: 1.6; }
    .badge {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 6px 14px; border-radius: 9999px;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.2);
      color: #f87171; font-size: 13px; font-weight: 600;
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #ef4444; animation: pulse 1.5s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .tip {
      margin-top: 8px; padding: 12px 20px; border-radius: 12px;
      background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.15);
      font-size: 13px; color: #fbbf24; max-width: 340px;
    }
    .retry-btn {
      margin-top: 16px; padding: 12px 28px;
      background: linear-gradient(135deg, #f59e0b, #d97706);
      color: white; font-size: 14px; font-weight: 700;
      border: none; border-radius: 12px; cursor: pointer;
      transition: opacity 0.15s;
    }
    .retry-btn:hover { opacity: 0.9; }
    .countdown { font-size: 12px; color: #3a3a48; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="icon">📴</div>
  <h1>You're offline</h1>
  <div class="badge"><div class="dot"></div> No internet connection</div>
  <p>The CheezyHub POS is running in offline mode. Any orders you place will be saved locally and automatically synced when you reconnect.</p>
  <div class="tip">💡 Your queued orders are safe — they're stored locally and will sync as soon as internet is available.</div>
  <button class="retry-btn" onclick="window.location.reload()">Try Again</button>
  <p class="countdown" id="countdown"></p>

  <script>
    let secs = 15;
    const el = document.getElementById('countdown');
    const tick = () => {
      el.textContent = `Auto-retrying in ${secs}s…`;
      if (--secs < 0) window.location.reload();
      else setTimeout(tick, 1000);
    };
    tick();

    // Auto-retry when back online
    window.addEventListener('online', () => window.location.reload());
  </script>
</body>
</html>
